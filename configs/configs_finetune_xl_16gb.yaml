model:
  target: spamo.t5_slt.FlanT5SLT

  params:
    lr: 6.0e-4
    monitor: val/bleu4
    # Keep XL as requested
    model_name: google/flan-t5-xl
    # Point to a local Hugging Face cache with enough disk (see notes below)
    cache_dir: /data3/models
    inter_hidden: 768
    input_size: 2048
    beam_size: 5
    # Lower visual sequence length to cut activation memory
    max_frame_len: 128
    max_txt_len: 64
    # More aggressive downsampling of visual tokens
    frame_sample_rate: 3     # use 4 if you still OOM
    prompt: "Translate the given sentence into {}."
    tuning_type: lora
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.1
    fusion_mode: joint
    warm_up_steps: 0
    cross_modal_align: true
    combined_loss: true
    alpha: 1.0
    use_in_context: true
    num_in_context: 3

lightning:
  callback:
    learning_rate_logger:
      target: pytorch_lightning.callbacks.LearningRateMonitor
      params:
        logging_interval: step
  trainer:
    # Higher accumulation to keep effective batch size while fitting 16 GB
    accumulate_grad_batches: 16
    accelerator: gpu
    devices: 1
    max_epochs: 500
    gradient_clip_val: 1.0
    check_val_every_n_epoch: 2
    precision: bf16

data:
  target: dataset.datamodule.DataModuleFromConfig
  params:
    # Per-GPU batch size trimmed to 1
    batch_size: 1
    num_workers: 4

    train:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        # Point these to the directories created by your feature extraction
        feat_root: /data2/sl_datasets/vit_feat_Phoenix14T
        mae_feat_root: /data2/sl_datasets/mae_feat_Phoenix14T
        mode: train
        spatial: true
        spatiotemporal: true
        spatial_postfix: _s2wrapping
        # If you use the repo’s Dropbox features, keep "_overlap-8-pretrained".
        # If you generated your own with mae_extract_feature.py, use "_overlap-8".
        spatiotemporal_postfix: _overlap-8-pretrained

    validation:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        feat_root: /data2/sl_datasets/vit_feat_Phoenix14T
        mae_feat_root: /data2/sl_datasets/mae_feat_Phoenix14T
        mode: test
        spatial: true
        spatiotemporal: true
        spatial_postfix: _s2wrapping
        spatiotemporal_postfix: _overlap-8-pretrained

    test:
      target: dataset.p14t.Phoenix14T
      params:
        anno_root: ./preprocess/Phoenix14T
        vid_root: ./dataset/Phoenix14T
        feat_root: /data2/sl_datasets/vit_feat_Phoenix14T
        mae_feat_root: /data2/sl_datasets/mae_feat_Phoenix14T
        mode: test
        spatial: true
        spatiotemporal: true
        spatial_postfix: _s2wrapping
        spatiotemporal_postfix: _overlap-8-pretrained