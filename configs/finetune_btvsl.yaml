# =============================================================================
# BTVSL Sign Language Translation Config
# =============================================================================
#
# Pipeline steps (run in order):
#   1. Extract frames (cut video segments by start/end time):
#      python scripts/extract_frames_btvsl.py \
#        --dataset_root /path/to/BTVSL_videos \
#        --csv_path /path/to/sentences.csv \
#        --output_dir /path/to/extracted_frames \
#        --resize 256 256
#
#   2. Preprocess annotations:
#      python scripts/preprocess_btvsl.py \
#        --csv_path /path/to/sentences.csv \
#        --frame_root /path/to/extracted_frames \
#        --output_dir ./preprocess/BTVSL
#
#   3. Extract ViT features (anno_root basename must be "BTVSL"):
#      python scripts/vit_extract_feature.py \
#        --anno_root ./preprocess/BTVSL \
#        --video_root /path/to/extracted_frames \
#        --save_dir /path/to/preextracted-btvsl \
#        --device cuda:0 \
#        --s2_mode s2wrapping --scales 1 2
#
#   4. Extract MAE features (anno_root basename must be "BTVSL"):
#      python scripts/mae_extract_feature.py \
#        --anno_root ./preprocess/BTVSL \
#        --video_root /path/to/extracted_frames \
#        --save_dir /path/to/preextracted-btvsl \
#        --device cuda:0 \
#        --overlap_size 8
#
#   5. Train:
#      python main.py -c configs/finetune_btvsl.yaml -e bleu
# =============================================================================

model:
  target: spamo.banglat5_slt.BanglaT5SLT

  params:
    lr: 6.0e-4
    monitor: val/bleu4
    model_name: csebuetnlp/banglat5
    cache_dir: ./hf_cache
    inter_hidden: 768
    input_size: 2048
    beam_size: 5
    max_frame_len: 128
    max_txt_len: 64
    frame_sample_rate: 1
    prompt: "ইশারা ভাষা থেকে বাংলায় অনুবাদ করুন:"
    tuning_type: lora
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.1
    fusion_mode: joint
    warm_up_steps: 0
    cross_modal_align: true
    combined_loss: true
    alpha: 1.0

lightning:
  callback:
    learning_rate_logger:
      target: pytorch_lightning.callbacks.LearningRateMonitor
      params:
        logging_interval: step
  trainer:
    accumulate_grad_batches: 8
    accelerator: gpu
    devices: 1
    max_epochs: 200
    gradient_clip_val: 1.0
    check_val_every_n_epoch: 2
    precision: bf16

data:
  target: dataset.datamodule.DataModuleFromConfig
  params:
    batch_size: 2
    num_workers: 4

    train:
      target: dataset.btvsl.BTVSLDataset
      params:
        anno_root: ./preprocess/BTVSL
        frame_root: /path/to/extracted_frames
        feat_root: /path/to/preextracted-btvsl/clip-vit-large-patch14_feat_BTVSL
        mae_feat_root: /path/to/preextracted-btvsl/mae_feat_BTVSL
        mode: train
        spatial: true
        spatiotemporal: true
        spatial_postfix: _s2wrapping
        spatiotemporal_postfix: _overlap-8

    validation:
      target: dataset.btvsl.BTVSLDataset
      params:
        anno_root: ./preprocess/BTVSL
        frame_root: /path/to/extracted_frames
        feat_root: /path/to/preextracted-btvsl/clip-vit-large-patch14_feat_BTVSL
        mae_feat_root: /path/to/preextracted-btvsl/mae_feat_BTVSL
        mode: dev
        spatial: true
        spatiotemporal: true
        spatial_postfix: _s2wrapping
        spatiotemporal_postfix: _overlap-8

    test:
      target: dataset.btvsl.BTVSLDataset
      params:
        anno_root: ./preprocess/BTVSL
        frame_root: /path/to/extracted_frames
        feat_root: /path/to/preextracted-btvsl/clip-vit-large-patch14_feat_BTVSL
        mae_feat_root: /path/to/preextracted-btvsl/mae_feat_BTVSL
        mode: test
        spatial: true
        spatiotemporal: true
        spatial_postfix: _s2wrapping
        spatiotemporal_postfix: _overlap-8
